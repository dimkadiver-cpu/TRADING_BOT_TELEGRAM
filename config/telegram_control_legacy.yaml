token_env: CONTROL_TELEGRAM_BOT_TOKEN

default_account: main

delivery_mode: supergroup_topics

authorized_users:
  - "${CONTROL_TELEGRAM_USER_ID}"

startup:
  mode: auto
  restore_max_age_seconds: 300

keyboard:
  - ["/status", "/health", "/control"]
  - ["/trades", "/reviews", "/logs"]
  - ["/pause", "/resume"]
  - ["/block", "/debug_on"]

notifications:
  startup: "on"
  shutdown: "on"
  control_change: "on"
  review_required: "on"
  entry_order_placed: "silent"
  entry_filled: "on"
  tp_filled: "on"
  sl_filled: "on"
  close_full_filled: "on"
  close_partial_filled: "on"
  order_rejected: "on"
  reconciliation_warning: "on"
  technical_error: "on"

per_account:
  main:
    chat_id: 0
    topics:
      clean_log:
        thread_id: 11
        per_trader:
          trader_prova: 637
          sma_intraday: 637
          rsi_swing: 637
          rsi_intraday: 637
        debounce_seconds: 20
        aggregate_fills_seconds: 30
        aggregate_updates_seconds: 20
        max_messages_per_chain_per_minute: 4
        min_partial_fill_notify_pct: 10
      tech_log:
        thread_id: 3
        enabled: true
        min_level: INFO
        operational_events: true
        batch_seconds: 10
        max_messages_per_minute: 20
        dedupe_window_seconds: 60
        max_repeated_before_summary: 5
        debug_max_duration_minutes: 60
      commands:
        thread_id: 13
