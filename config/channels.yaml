# TeleSignalBot - channels configuration
# Il listener rilegge questo file senza restart (hot reload via watchdog).

recovery:
  max_hours: 0  # finestra temporale messaggi recuperati al restart

blacklist_global:  # Frasi che, se presenti nel testo, scartano il messaggio
  - "#admin"
  - "#админ"
  - "#info"
  - "#pinned"
  - "Админ на связи"

channels:
  - chat_id: -1003722628653
    topic_id: 3
    label: "PifSignal_A"  # canale reale attivo concordato
    active: true  # disattivato per test, da attivare quando serve
    trader_id: trader_a   # canale multi-trader: trader_a / trader_b / trader_c / trader_d / trader_3
    parser_profile: trader_a       # Opzionale — override del profilo parser
    blacklist: []     # estendere qui solo per rumore specifico del canale

  - chat_id: -1003722628653
    topic_id: 4
    label: "PifSignal_B"  # canale reale attivo concordato
    active: false  # disattivato per test, da attivare quando serve
    trader_id: trader_b   # canale multi-trader: trader_a / trader_b / trader_c / trader_d / trader_3
    parser_profile: trader_b       # Opzionale — override del profilo parser
    blacklist: []     # estendere qui solo per rumore specifico del canale

  - chat_id: -1003722628653
    topic_id: 5
    label: "PifSignal_C"  # canale reale attivo concordato
    active: false  # disattivato per test, da attivare quando serve
    trader_id: trader_c   # canale multi-trader: trader_a / trader_b / trader_c / trader_d / trader_3
    parser_profile: trader_c       # Opzionale — override del profilo parser
    blacklist: []     # estendere qui solo per rumore specifico del canale

  - chat_id: -1003722628653
    topic_id: 7
    label: "PifSignal_D"  # canale reale attivo concordato
    active: false  
    trader_id: trader_d   # canale multi-trader: trader_a / trader_b / trader_c / trader_d / trader_3
    parser_profile: trader_d       # Opzionale — override del profilo parser
    blacklist: []     # estendere qui solo per rumore specifico del canale


  - chat_id: -1003722628653
    topic_id: 8
    label: "PifSignal_3"  # canale reale attivo concordato
    active: true  # disattivato per test, da attivare quando serve
    trader_id: trader_3   # canale multi-trader: trader_a / trader_b / trader_c / trader_d / trader_3
    parser_profile: trader_3       # Opzionale — override del profilo parser
    blacklist: []     # estendere qui solo per rumore specifico del canale


  # Esempio topic multi-trader: topic_id 9 = RSI channel, trader risolto per tag/alias
  - chat_id: -1003722628653
    topic_id: 4180
    label: "RSI_MultiTrader"
    active: false
    trader_id: null           # null = risoluzione dinamica per tag
    parser_profile: multi_strategi      # derivato dalla risoluzione del trader
    resolution:
      max_depth: 5
      aliases: {
        "@trader_a_tag": "sma_intraday",
        "@trader_b_tag": "rsi_swing",
        "@trader_c_tag": "rsi_intraday"
      }             # compilare con i tag reali usati dai trader, es: { "@trader_a_tag": "trader_a" }
    blacklist: []

  - chat_id: -1003927267771
    topic_id:
    label: prova  # canale reale attivo concordato
    active: true  # disattivato per test, da attivare quando serve
    trader_id: trader_prova   # canale multi-trader: trader_a / trader_b / trader_c / trader_d / trader_3
    parser_profile: trader_prova       # Opzionale — override del profilo parser
    blacklist: []     # estendere qui solo per rumore specifico del canale

