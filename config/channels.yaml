# TeleSignalBot - channels configuration
# Il listener rilegge questo file senza restart (hot reload via watchdog).

recovery:
  max_hours: 0  # finestra temporale messaggi recuperati al restart

blacklist_global:  # Frasi che, se presenti nel testo, scartano il messaggio
  - "#admin"
  - "#админ"
  - "#info"
  - "#pinned"
  - "Админ на связи"

channels:
  - chat_id: -1003722628653
    topic_id: 3
    label: "PifSignal_A"  # canale reale attivo concordato
    active: true  # disattivato per test, da attivare quando serve
    trader_id: trader_a   # canale multi-trader: trader_a / trader_b / trader_c / trader_d / trader_3
    parser_profile: trader_a       # Opzionale — override del profilo parser
    blacklist: []     # estendere qui solo per rumore specifico del canale

