# TeleSignalBot — channels configuration
# Il listener rilegge questo file senza restart (hot reload via watchdog).

recovery:
  max_hours: 4  # finestra temporale messaggi recuperati al restart

blacklist_global:
  - "#admin"
  - "#info"
  - "#pinned"
  - "Админ на связи"

channels: []
