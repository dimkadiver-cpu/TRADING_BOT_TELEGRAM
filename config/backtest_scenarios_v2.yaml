# backtest_scenarios_v2.yaml
# Configuratore scenari avanzato — Fase 8, Step 25
#
# Modalità supportate:
#   presets   — template condizioni riutilizzabili
#   scenarios — scenari espliciti (con extend/overrides opzionali)
#   sweep     — varia una variabile alla volta, le altre fisse
#   matrix    — prodotto cartesiano di variabili

# ─────────────────────────────────────────────────────────────────────────────
# Preset: template di condizioni base riutilizzabile
# ─────────────────────────────────────────────────────────────────────────────

presets:
  base:
    risk_pct: 1.0
    gate_mode: strict
    entry:
      selection: all
      price_mode: exact
    tp:
      count: null          # tutti i TP
      close_scheme: null   # chiude tutto all'ultimo TP
    management:
      sl_to_be_after_tp: null
    chain_follow:
      U_MOVE_STOP: false
      U_CLOSE_FULL: false
      U_CLOSE_PARTIAL: false
      U_CANCEL_PENDING: false
      U_REENTER: false
      U_ADD_ENTRY: false
      U_UPDATE_TAKE_PROFITS: false

# ─────────────────────────────────────────────────────────────────────────────
# Scenari espliciti (con preset)
# ─────────────────────────────────────────────────────────────────────────────

scenarios:
  - name: conservative
    description: "Segnali puri, rischio ridotto al 0.5%, BE dopo TP1"
    extends: base
    overrides:
      risk_pct: 0.5
      management:
        sl_to_be_after_tp: 1

  - name: follow_close_and_stop
    description: "Segue chiusure totali e spostamento SL, BE dopo TP2"
    extends: base
    overrides:
      risk_pct: 1.0
      chain_follow:
        U_CLOSE_FULL: true
        U_MOVE_STOP: true
        U_CANCEL_PENDING: true
      management:
        sl_to_be_after_tp: 2

# ─────────────────────────────────────────────────────────────────────────────
# Sweep: varia risk_pct mantenendo tutto il resto fisso
# ─────────────────────────────────────────────────────────────────────────────

sweep:
  - name: risk_sweep
    description: "Varia solo il rischio per trade"
    base_conditions:
      risk_pct: 1.0
      gate_mode: strict
      entry:
        selection: all
        price_mode: exact
      tp:
        count: null
        close_scheme: null
      management:
        sl_to_be_after_tp: null
      chain_follow:
        U_MOVE_STOP: false
        U_CLOSE_FULL: false
        U_CLOSE_PARTIAL: false
        U_CANCEL_PENDING: false
        U_REENTER: false
        U_ADD_ENTRY: false
        U_UPDATE_TAKE_PROFITS: false
    sweep_variable: risk_pct
    sweep_values: [0.5, 1.0, 2.0]
    # Genera: risk_sweep_0.5, risk_sweep_1.0, risk_sweep_2.0

  - name: entry_selection_sweep
    description: "Varia la strategia di selezione entry"
    base_conditions:
      risk_pct: 1.0
      gate_mode: strict
      entry:
        selection: all
        price_mode: exact
      tp:
        count: null
        close_scheme: null
      management:
        sl_to_be_after_tp: null
      chain_follow:
        U_MOVE_STOP: false
        U_CLOSE_FULL: false
        U_CLOSE_PARTIAL: false
        U_CANCEL_PENDING: false
        U_REENTER: false
        U_ADD_ENTRY: false
        U_UPDATE_TAKE_PROFITS: false
    sweep_variable: entry.selection
    sweep_values: [first_only, all]
    # Genera: entry_selection_sweep_first_only, entry_selection_sweep_all

# ─────────────────────────────────────────────────────────────────────────────
# Matrix: prodotto cartesiano entry.price_mode × tp.count
# 2 × 3 = 6 scenari
# ─────────────────────────────────────────────────────────────────────────────

matrix:
  - name: entry_x_tp
    description: "Incrocia modalità prezzo entry con numero TP"
    variables:
      entry.price_mode: [exact, average]
      tp.count: [1, 2, null]
    # Genera 6 scenari:
    #   entry_x_tp_exact_1, entry_x_tp_exact_2, entry_x_tp_exact_None
    #   entry_x_tp_average_1, entry_x_tp_average_2, entry_x_tp_average_None

# ─────────────────────────────────────────────────────────────────────────────
# Impostazioni globali del run
# ─────────────────────────────────────────────────────────────────────────────

backtest_settings:
  trader_filter: null             # null = tutti i trader; oppure "trader_3"
  date_from: null                 # YYYY-MM-DD, null = nessun filtro
  date_to: null
  ohlcv_source: bybit_api         # bybit_api | local_files
  timeframe: 5m
  capital_base_usdt: 1000.0
  exchange: bybit
  max_open_trades: 10
