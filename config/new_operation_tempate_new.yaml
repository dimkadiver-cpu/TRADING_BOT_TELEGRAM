 # ── Account routing ──────────────────────────────────────────────────────────
  account_mode: single  # single | per_trader_subaccount

  registered_traders:  # BLOCK se trader non in lista
    - trader_3
    - trader_a
    - trader_b
    - trader_c
    - trader_d

  accounts:
    _default:
      account_id: "main"
      capital_base_usdt: 1000.0
    trader_a:
      account_id: "subaccount_trader_a"
      capital_base_usdt: 500.0
    trader_b:
      account_id: "subaccount_trader_b"
      capital_base_usdt: 300.0

  # ── Hard caps (mai superabili, nessun override per trader) ───────────────────
  global_hard_caps:
    max_leverage: 5
    allow_unprotected_positions: false
    max_capital_at_risk_pct: 10.0   # ceiling assoluto

  # ── Symbol blacklist ─────────────────────────────────────────────────────────
  symbol_blacklist:
    global: ["LUNA", "FTT"]
    per_trader:
      trader_a: ["DOGE", "PEPE"]
      trader_b: []


  account_mode: single  # single | per_trader_subaccount

  global_safety:
    allow_unprotected_positions: false

  # Solo se account_mode: single
  global_hard_caps:
    max_capital_at_risk_pct: 10.0
    hard_max_per_signal_risk_pct: 2.0

    market_execution:
      mode: tolerance              # tolerance | free
      tolerance_pct: 0.5
      range_tolerance_pct: 0.2

  accounts:
    _default:
      account_id: "main"
      capital_base_usdt: 1000.0
      max_leverage: 5
      max_capital_at_risk_pct: 10.0  # usato se account_mode: per_trader_subaccount

  symbol_blacklist:
    global: []
    per_trader: {}

  # ── Defaults (overridabili per trader) ───────────────────────────────────────
  defaults:
    enabled: true
    gate_mode: block               # block | warn
    operation_rules: override      # override | global

    signal_policy:
      require_sl: true
      accepted_entry_structures:
        - ONE_SHOT
        - TWO_STEP
        - RANGE
        - LADDER

      entry_split:
        LIMIT:
          single:
            weights: {E1: 1.0}
          range:
            split_mode: endpoints  # endpoints | firstpoint | lastpoint | midpoint
            weights: {E1: 0.50, E2: 0.50}
          averaging:
            weights: {E1: 0.70, E2: 0.30}
          ladder:
            weights: {E1: 0.50, E2: 0.30, E3: 0.20}
        MARKET:
          single:
            weights: {E1: 1.0}
          averaging:
            weights: {E1: 0.70, E2: 0.30}

      tp:
        use_tp_count: null         # null = tutti | N = primi N
        close_distribution:
          mode: table              # table | equal
          table:
            1: [100]
            2: [50, 50]
            3: [30, 30, 40]
            4: [25, 25, 25, 25]
            5: [20, 20, 20, 20, 20]
            6: [20, 20, 20, 20, 10, 10]

      sl:
        use_original_sl: true
        require_sl: true

      price_corrections:
        enabled: false
        round_to_tick: false
        clamp_to_exchange_precision: false

      price_sanity:
        enabled: false
        symbol_ranges: {}

    update_admission:

      apply_move_stop: true
      apply_move_stop_to_be: true
      apply_close_partial: true
      apply_close_full: true
      apply_cancel_pending: true
      apply_add_entry: true
      apply_modify_entry: true
      apply_update_take_profits: true
      apply_reenter: true 

    # Embedded nella trade_chain al momento della creazione (Lifecycle)
    management_plan:
      be_trigger: null             # null | tp1 | tp2 | tp3
      be_buffer_pct: 0.0
      cancel_pending_by_engine: true
      cancel_pending_on_timeout: true
      pending_timeout_hours: 24
      chain_timeout_hours: 168
      cancel_averaging_pending_after: null  # null | tp1 | tp2
      cancel_unfilled_pending_after: null   # null | tp1 | tp2
      risk_freed_by_be: true
      protective_sl_mode: exchange_native_first

    # Letto dal Lifecycle Entry Gate (PRD 04)
    risk:
      mode: risk_pct_of_capital    # risk_pct_of_capital | risk_usdt_fixed
      risk_pct_of_capital: 1.0
      risk_usdt_fixed: 10.0
      capital_base_mode: static_config  # static_config | live_equity
      leverage: 1
      use_trader_risk_hint: false
      max_capital_at_risk_per_trader_pct: 5.0
      max_concurrent_trades: 5
      max_concurrent_same_symbol: 1

  config/traders/trader_a.yaml (esempio override):

  enabled: true
  gate_mode: block

  signal_policy:
    tp:
      use_tp_count: 2

  update_admission:
    MOVE_STOP_TO_BE: true

  management_plan:
    be_trigger: tp2
    be_buffer_pct: 0.05

  risk:
    risk_pct_of_capital: 0.5
    max_concurrent_trades: 3