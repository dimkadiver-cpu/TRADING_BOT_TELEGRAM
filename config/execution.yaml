# config/execution.yaml
# Env vars richieste:
#   BYBIT_API_SECRET_BYBIT_DEMO=<secret>
#   BYBIT_API_SECRET_BYBIT_PAPER=<secret>  (opzionale)
#   TSB_ALLOW_LIVE_TRADING=YES_I_UNDERSTAND  (solo per mode: live)

execution:
  default_adapter: bybit_demo

  account_routing:
    default:
      adapter: bybit_demo
      execution_account_id: master_account

  adapters:
    bybit_demo:
      type: ccxt_bybit
      mode: demo
      connector: bybit
      testnet: true
      api_key: ""
      leverage: 10
      hedge_mode: false

      websocket:
        enabled: false
        poll_fallback_enabled: true
        poll_fallback_period_seconds: 60

      entry_execution:
        mode: b_entry_stop_then_tp

      retry:
        max_attempts: 3
        backoff_seconds: [30, 90, 300]

      capabilities:
        place_entry: true
        protective_stop_native: false
        take_profit_native: false
        bracket_order: false
        move_stop: true
        close_partial: true
        close_full: true
        executor_position: false
        sync_protective_orders: true

      take_profit:
        min_order_policy: review
        residual_policy: assign_to_last_tp

      position_management:
        same_symbol_same_side_policy: block
        same_symbol_opposite_side_policy: allow_if_hedge_mode
        require_client_order_id_correlation: true

      live_safety:
        allow_live_trading: false

    bybit_paper:
      type: ccxt_bybit
      mode: paper
      connector: bybit
      testnet: true
      api_key: ""
      leverage: 10
      hedge_mode: false

      entry_execution:
        mode: b_entry_stop_then_tp

      retry:
        max_attempts: 3
        backoff_seconds: [30, 90, 300]

      capabilities:
        place_entry: true
        protective_stop_native: false
        take_profit_native: false
        bracket_order: false
        move_stop: true
        close_partial: true
        close_full: true
        executor_position: false
        sync_protective_orders: true

      take_profit:
        min_order_policy: review
        residual_policy: assign_to_last_tp

      position_management:
        same_symbol_same_side_policy: block
        same_symbol_opposite_side_policy: allow_if_hedge_mode
        require_client_order_id_correlation: true

      live_safety:
        allow_live_trading: false
