# Operation rules per trader_a
# Override selettivo su global_defaults (config/operation_rules.yaml)
# Ometti una chiave per ereditare il default globale.

enabled: true
gate_mode: block
operation_rules: override

risk_mode: risk_pct_of_capital
risk_pct_of_capital: 5.0
risk_usdt_fixed: 20.0
capital_base_mode: static_config
capital_base_usdt: 1000.0

use_trader_risk_hint: false
leverage: 1
max_capital_at_risk_per_trader_pct: 5.0
max_concurrent_same_symbol: 1

entry_split:
  LIMIT:
    single:
      weights:
        E1: 1.0
    averaging:
      weights:
        E1: 0.70
        E2: 0.30
  MARKET:
    single:
      weights:
        E1: 1.0
    averaging:
      weights:
        E1: 0.70
        E2: 0.30
