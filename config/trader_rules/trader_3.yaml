# Operation rules per trader_3
# Override selettivo su global_defaults (config/operation_rules.yaml)
# Ometti una chiave per ereditare il default globale.

enabled: true
gate_mode: block                       # warn durante sviluppo (non blocca)
operation_rules: override             # override | global (usa solo global defaults)

# Modello rischio
risk_mode: risk_pct_of_capital
risk_pct_of_capital: 1.0             # 1% del capitale per trade
capital_base_mode: static_config
capital_base_usdt: 1000.0            # da aggiornare con il capitale reale

use_trader_risk_hint: false
leverage: 1
max_capital_at_risk_per_trader_pct: 5.0
max_concurrent_same_symbol: 1

entry_split:
  ZONE:
    split_mode: endpoints
    weights:
      E1: 0.50
      E2: 0.50
  AVERAGING:
    distribution: equal
  LIMIT:
    single:
      weights:
        E1: 1.0
    averaging:
      weights:
        E1: 0.50
        E2: 0.50
  MARKET:
    single:
      weights:
        E1: 1.0
    averaging:
      weights:
        E1: 0.50
        E2: 0.50

price_sanity:
  enabled: false
  symbol_ranges: {}

 # ── Gestione TP ─────────────────────────────────────────────────────────
  tp_handling:
    tp_handling_mode: follow_all_signal_tps   # follow_all_signal_tps | limit_to_max_levels
    max_tp_levels: 3                           # usato solo se limit_to_max_levels
    tp_close_distribution:                     # tabelle separate per numero di TP
      2: [50, 50]
      3: [30, 30, 40]
      4: [25, 25, 25, 25]
      # fallback: distribuzione uguale se numero TP non in tabella